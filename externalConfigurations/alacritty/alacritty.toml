import = [
    "~/.config/alacritty/themes/themes/nord.toml"
    ]
[window]
opacity = 0.80

[font]
size = 11.0

[font.bold]
family = "Sarasa Term J"
style = "Bold"

[font.bold_italic]
family = "Sarasa Term J"
style = "Bold Italic"

[font.italic]
family = "Sarasa Term J"
style = "Italic"

[font.normal]
family = "Sarasa Term J"
style = "Regular"

[[hints.enabled]]
regex = "[^ ]+\\.rs:\\d+:\\d+"
command = { program = "code", args = [ "--goto" ] }
mouse = { enabled = true }
